<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRESWEAR | High-End Streetwear</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --accent: #444444; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; border-bottom: 1px solid var(--accent); }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Hero Section */
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1558769132-cb1aea458c5e?auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center; }
        .hero h1 { font-size: 4rem; margin: 0; letter-spacing: 10px; }
        .hero p { font-size: 1.2rem; color: #ccc; margin-top: 10px; }

        /* Product Grid */
        .products { padding: 50px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid #111; padding-bottom: 20px; transition: 0.3s; position: relative; overflow: hidden; }
        .product-card:hover { border-color: var(--text); }
        .product-image { width: 100%; height: 400px; background-color: #111; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #555; }
        .product-info { padding: 20px; text-align: center; }
        .product-name { font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .product-price { color: #888; }

        /* Footer */
        footer { padding: 50px; border-top: 1px solid var(--accent); text-align: center; font-size: 0.8rem; letter-spacing: 2px; color: #555; }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            nav { padding: 20px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">CRES</div>
    <div class="nav-links">
        <a href="#">Shop</a>
        <a href="#">Lookbook</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">
    <h1>CRESWEAR</h1>
    <p>DEFINING NEW STANDARDS</p>
</section>

<div class="products">
    <div class="product-card">
        <div class="product-image">HOODIE IMAGE [SAMPLE]</div>
        <div class="product-info">
            <div class="product-name">CRES Oversized Hoodie v1</div>
            <div class="product-price">1.200 TL</div>
        </div>
    </div>

    <div class="product-card">
        <div class="product-image">T-SHIRT IMAGE [SAMPLE]</div>
        <div class="product-info">
            <div class="product-name">CRES Signature Tee</div>
            <div class="product-price">650 TL</div>
        </div>
    </div>

    <div class="product-card">
        <div class="product-image">PANTS IMAGE [SAMPLE]</div>
        <div class="product-info">
            <div class="product-name">Cargo Pants "Noir"</div>
            <div class="product-price">1.500 TL</div>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 CRESWEAR BY NETIZEN. ALL RIGHTS RESERVED.
</footer>

</body>
</html>
